# =============================================================================
# Goma Admin - Docker Compose Example
# =============================================================================
# Usage:
#   cp .env.example .env   # then edit .env with your values
#   docker compose up -d
#
# Services:
#   - goma-gateway   : API Gateway / data plane      (ports 80/443)
#   - goma-admin     : Control Plane dashboard + API  (port 9000)
#   - goma-postgres  : PostgreSQL database
#
# The gateway and admin share a "providers" volume so that configuration
# files written by Goma Admin are immediately visible to the gateway.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Goma Gateway - Data Plane
  # ---------------------------------------------------------------------------
  # The gateway reads its configuration from YAML files written by Goma Admin
  # into the shared "providers" volume. The file provider watches the directory
  # and hot-reloads on every change — no restart required.
  # ---------------------------------------------------------------------------
  goma-gateway:
    image: jkaninda/goma-gateway:latest
    container_name: goma-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      GOMA_LOG_LEVEL: info
      GOMA_ENTRYPOINT_WEB_ADDRESS: :80
      GOMA_ENTRYPOINT_WEB_SECURE_ADDRESS: :443
    volumes:
      - providers:/etc/goma/providers
      - ./goma.yml:/etc/goma/goma.yml:ro

  # ---------------------------------------------------------------------------
  # Goma Admin - Control Plane
  # ---------------------------------------------------------------------------
  goma-admin:
    image: jkaninda/goma-admin:latest
    container_name: goma-admin
    restart: unless-stopped
    ports:
      - "${GOMA_PORT:-9000}:9000"
    env_file:
      - .env
    volumes:
      - providers:/etc/goma/providers
      # Uncomment to enable the Docker provider (auto-discover routes from labels)
      # - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      goma-postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  goma-postgres:
    image: postgres:17-alpine
    container_name: goma-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${GOMA_DB_USER:-goma}
      POSTGRES_PASSWORD: ${GOMA_DB_PASSWORD:-goma}
      POSTGRES_DB: ${GOMA_DB_NAME:-goma}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GOMA_DB_USER:-goma}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Example: Application with Docker auto-discovery (optional)
  # ---------------------------------------------------------------------------
  # When GOMA_DOCKER_ENABLED=true and the Docker socket is mounted, Goma Admin
  # discovers containers by their "goma.*" labels and registers routes
  # automatically. Uncomment the service below to try it out.
  #
  # api-service:
  #   image: jkaninda/okapi-example
  #   container_name: api-service
  #   labels:
  #     - "goma.enable=true"
  #     - "goma.name=api-example"
  #     - "goma.path=/"
  #     - "goma.port=8080"
  #     - "goma.rewrite=/"
  #     - "goma.hosts=api.example.com"
  #     - "goma.methods=GET,POST,PUT,DELETE,PATCH"
  #     - "goma.health_check.path=/"
  #     - "goma.health_check.interval=30s"
  #     - "goma.health_check.timeout=5s"

volumes:
  postgres_data: {}
  providers: {}
