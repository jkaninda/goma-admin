services:
  goma-postgres:
    image: postgres:16-alpine
    container_name: goma-admin-postgres
    environment:
      POSTGRES_USER: goma
      POSTGRES_PASSWORD: goma
      POSTGRES_DB: goma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goma"]
      interval: 10s
      timeout: 5s
      retries: 5

  goma-admin:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: goma-admin
    ports:
      - "9000:9000"
    environment:
      GOMA_DB_URL: postgresql://goma:goma@goma-postgres:5432/goma?sslmode=disable
      GOMA_PORT: 9000
      GOMA_ENVIRONMENT: development
      GOMA_WEB_DIR: /app/web/dist
    depends_on:
      goma-postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
